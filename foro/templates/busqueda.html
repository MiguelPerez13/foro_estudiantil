<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busqueda</title>
</head>
<body>
    
    {% for post in posts %}
        <a href="{% url 'post' post.id %}">{{post.titulo}}</a>
    {% empty %}
        <p>Aun no hay posts</p>
    {% endfor %}        

</body>
</html>
