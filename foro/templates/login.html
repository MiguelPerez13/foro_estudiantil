{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}


<div class="card">

    <div class="card-header">
        <h2>Iniciar Sesión</h2>
    </div>
    {% for error in field.errors %}
        <div class="text-danger small">{{ error }}</div>
    {% endfor %}
    <div class="card-content">
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                {{ form.username }}
            </div>
            
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                {{ form.password }}
            </div>
            
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-sm">Entrar</button>
            </div>
            <small>¿Aun no tienes cuenta? <a href="{% url 'registro' %}">Registrate aquí</a></small>
        </form>
    </div>
    
</div>
<script>
    document.querySelectorAll('input').forEach(input => input.classList.add('input'));
</script>

{% endblock %}
