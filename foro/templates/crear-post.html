{% extends "base.html" %}

{% block title %}Crear post {% endblock %}

{% block content %}

<h3 class="page-subtitle">Publicar nueva tarea o examen</h3>
<div class="card">
    <div class="card-content">

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %} {{ form.as_p }} <button type="submit" class="btn btn-primary btn-sm">Publicar ahora</button>
        </form>
        
    </div>
</div>

{% endblock %}
