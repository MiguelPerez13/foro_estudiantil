<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
</head>
<body>
    
    {% for categoria in categorias %}
        <a href="{% url 'categoria' categoria.id %}"> {{categoria.nombre}} </a>
    {% empty %}
        <p>Aun no hay categorias disponibles</p>
    {% endfor %}
</body>
</html>
